<style>
.ai-carousel-wrapper {
  position: relative;
  width: 100%;
  margin: 0;
}

.ai-carousel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.ai-carousel-header h4 {
  margin: 0;
  font-size: 15px;
  color: #333;
  display: flex;
  align-items: center;
  gap: 8px;
}

.ai-carousel-header h4 .dot {
  width: 8px;
  height: 8px;
  background: #22c55e;
  border-radius: 50%;
  animation: ai-pulse 2s ease-in-out infinite;
}

@keyframes ai-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
  50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
}

.ai-carousel-nav {
  display: flex;
  gap: 6px;
}

.ai-carousel-nav button {
  width: 28px;
  height: 28px;
  border: 1px solid #ddd;
  border-radius: 50%;
  background: #fff;
  cursor: pointer;
  font-size: 12px;
  color: #666;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}

.ai-carousel-nav button:hover {
  background: #f0f0f0;
  border-color: #999;
}

/* 列表容器 */
.ai-news-list {
  list-style: none;
  margin: 0;
  padding: 0;
  min-height: 220px;
  position: relative;
  transition: opacity 0.35s ease;
}

.ai-news-list.fading {
  opacity: 0;
}

.ai-news-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid #f1f5f9;
  transition: background 0.2s;
}

.ai-news-item:last-child {
  border-bottom: none;
}

.ai-news-item:hover {
  background: #f8fafc;
}

/* 来源图标 */
.ai-news-item .item-icon {
  flex: 0 0 32px;
  width: 32px;
  height: 32px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: #fff;
  font-weight: 700;
}

.ai-news-item .item-icon.src-openai      { background: #10a37f; }
.ai-news-item .item-icon.src-anthropic   { background: #d97757; }
.ai-news-item .item-icon.src-huggingface { background: #ffbd45; color: #333; }
.ai-news-item .item-icon.src-google      { background: #4285f4; }
.ai-news-item .item-icon.src-nvidia      { background: #76b900; }
.ai-news-item .item-icon.src-meta        { background: #0668e1; }
.ai-news-item .item-icon.src-microsoft   { background: #737373; }
.ai-news-item .item-icon.src-stability   { background: #a855f7; }
.ai-news-item .item-icon.src-techcrunch  { background: #0a0; }
.ai-news-item .item-icon.src-mit         { background: #a31f34; }
.ai-news-item .item-icon.src-default     { background: #6366f1; }

/* 标题链接 */
.ai-news-item .item-title {
  flex: 1;
  font-size: 14px;
  color: #1e293b;
  line-height: 1.45;
  text-decoration: none;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 0.2s;
  cursor: pointer;
}

.ai-news-item .item-title:hover {
  color: #6366f1;
}

/* 时间标签 */
.ai-news-item .item-time {
  flex: 0 0 auto;
  font-size: 11px;
  color: #94a3b8;
  white-space: nowrap;
}

/* 加载状态 */
.ai-carousel-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: #94a3b8;
  font-size: 13px;
  gap: 8px;
  flex-direction: column;
}

.ai-carousel-loading .spinner {
  width: 28px;
  height: 28px;
  border: 3px solid #e2e8f0;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: ai-spin 0.8s linear infinite;
}

@keyframes ai-spin {
  to { transform: rotate(360deg); }
}

/* 分页指示点 */
.ai-carousel-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
}

.ai-carousel-dots .dot-ind {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #cbd5e1;
  transition: all 0.3s;
  cursor: pointer;
}

.ai-carousel-dots .dot-ind.active {
  background: #6366f1;
  width: 18px;
  border-radius: 3px;
}

@media (max-width: 768px) {
  .ai-news-item {
    padding: 10px 12px;
    gap: 10px;
  }
  .ai-news-item .item-title {
    font-size: 13px;
  }
}
</style>

<div class="ai-carousel-wrapper">
  <div class="ai-carousel-header">
    <h4><span class="dot"></span>AI 资讯速览</h4>
    <div class="ai-carousel-nav">
      <button class="ai-prev" title="上一页">&larr;</button>
      <button class="ai-next" title="下一页">&rarr;</button>
    </div>
  </div>

  <ul class="ai-news-list" id="aiNewsList">
    <li class="ai-carousel-loading">
      <div class="spinner"></div>
      <span>正在拉取最新 AI 资讯…</span>
    </li>
  </ul>

  <div class="ai-carousel-dots" id="aiDots"></div>
</div>

<script>
(function() {
  const list = document.getElementById('aiNewsList');
  const dots = document.getElementById('aiDots');
  const PAGE_SIZE = 5;
  let allCards = [];
  let totalPages = 0;
  let currentPage = 0;
  let autoTimer = null;

  function resolveJsonPath() {
    const depth = (location.pathname.match(/\//g) || []).length;
    const prefix = '../'.repeat(Math.max(0, depth - 1));
    return prefix + 'posts/ai-news.json';
  }

  // 来源 → 简称图标
  const srcIconMap = {
    'openai':      { cls: 'src-openai',      ico: 'O' },
    'anthropic':   { cls: 'src-anthropic',   ico: 'A' },
    'hugging':     { cls: 'src-huggingface', ico: 'HF' },
    'google':      { cls: 'src-google',      ico: 'G' },
    'deepmind':    { cls: 'src-google',      ico: 'D' },
    'nvidia':      { cls: 'src-nvidia',      ico: 'N' },
    'meta':        { cls: 'src-meta',        ico: 'M' },
    'microsoft':   { cls: 'src-microsoft',   ico: 'MS' },
    'stability':   { cls: 'src-stability',   ico: 'S' },
    'techcrunch':  { cls: 'src-techcrunch',  ico: 'TC' },
    'mit':         { cls: 'src-mit',         ico: 'MIT' },
  };

  function getSourceIcon(source) {
    const lower = source.toLowerCase();
    for (const [key, val] of Object.entries(srcIconMap)) {
      if (lower.includes(key)) return val;
    }
    return { cls: 'src-default', ico: source.slice(0, 2).toUpperCase() };
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      const now = new Date();
      const diffMs = now - d;
      const diffH = Math.floor(diffMs / 3600000);
      if (diffH < 1) return '刚刚';
      if (diffH < 24) return `${diffH} 小时前`;
      if (diffH < 48) return '昨天';
      return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
    } catch { return ''; }
  }

  function renderPage(pageIdx) {
    const start = pageIdx * PAGE_SIZE;
    const batch = allCards.slice(start, start + PAGE_SIZE);

    let html = '';
    batch.forEach(item => {
      const icon = getSourceIcon(item.source);
      html += `
        <li class="ai-news-item">
          <span class="item-icon ${icon.cls}">${icon.ico}</span>
          <a class="item-title" href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
          <span class="item-time">${formatDate(item.pubDate)}</span>
        </li>`;
    });

    list.classList.add('fading');
    setTimeout(() => {
      list.innerHTML = html;
      list.classList.remove('fading');
    }, 180);
  }

  function updateDots() {
    let html = '';
    for (let i = 0; i < totalPages; i++) {
      html += `<div class="dot-ind${i === currentPage ? ' active' : ''}" data-idx="${i}"></div>`;
    }
    dots.innerHTML = html;
    dots.querySelectorAll('.dot-ind').forEach(d => {
      d.addEventListener('click', function() { goToPage(parseInt(this.dataset.idx)); });
    });
  }

  function goToPage(idx) {
    if (idx < 0 || idx >= totalPages || totalPages === 0) return;
    currentPage = idx;
    renderPage(currentPage);
    updateDots();
  }

  function nextPage() {
    if (totalPages === 0) return;
    goToPage((currentPage + 1) % totalPages);
  }

  function prevPage() {
    if (totalPages === 0) return;
    goToPage((currentPage - 1 + totalPages) % totalPages);
  }

  function startAuto() {
    stopAuto();
    autoTimer = setInterval(nextPage, 3000);
  }

  function stopAuto() {
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  }

  // 事件绑定
  list.addEventListener('mouseenter', stopAuto);
  list.addEventListener('touchstart', stopAuto, { passive: true });
  list.addEventListener('mouseleave', startAuto);
  list.addEventListener('touchend', () => { setTimeout(startAuto, 2000); });

  document.querySelector('.ai-prev').addEventListener('click', prevPage);
  document.querySelector('.ai-next').addEventListener('click', nextPage);

  // 加载数据
  fetch(resolveJsonPath())
    .then(res => {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(data => {
      allCards = data;
      if (allCards.length === 0) throw new Error('empty');
      totalPages = Math.ceil(allCards.length / PAGE_SIZE);
      goToPage(0);
      startAuto();
    })
    .catch(err => {
      console.warn('AI news fetch failed:', err.message);
      list.innerHTML = `
        <li class="ai-carousel-loading">
          <span>资讯数据暂不可用</span>
          <span style="font-size:11px;color:#94a3b8">请运行 node scripts/scrape-ai-news.js 更新数据</span>
        </li>`;
    });
})();
</script>
