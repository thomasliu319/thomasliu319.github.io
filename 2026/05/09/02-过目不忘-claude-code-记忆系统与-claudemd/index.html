  <script>
    async function loadMarkdown() {
      try {
        const response = await fetch('/Clippings/Claude Code 工程化实战/02｜过目不忘：Claude Code 记忆系统与 CLAUDE.md-Claude Code 工程化实战-极客时间.md');
        const mdContent = await response.text();
        
        const contentDiv = document.getElementById('article-content');
        
        const frontMatterMatch = mdContent.match(/^---\n([\s\S]*?)\n---\n/);
        let content = mdContent;
        if (frontMatterMatch) {
          content = mdContent.slice(frontMatterMatch[0].length);
        }
        
        marked.setOptions({
          breaks: true,
          gfm: true
        });
        
        const html = marked.parse(content);
        contentDiv.innerHTML = html;
        
        Prism.highlightAllUnder(contentDiv);
      } catch (error) {
        document.getElementById('article-content').innerHTML = '<p>Failed to load content.</p>';
        console.error('Error loading markdown:', error);
      }
    }
    
    loadMarkdown();
    
    fetch('/widgets/dashboard.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('dashboard-container').innerHTML = html;
      });
  </script>
